{{/* Favicons derived from author profile image (see languages.*.toml params.author.image) */}}
{{ with .Params.Author.image }}
  {{ $src := resources.Get . }}
  {{ if $src }}
    {{ $16 := $src.Resize "16x16" }}
    {{ $32 := $src.Resize "32x32" }}
    {{ $180 := $src.Fill "180x180 q90" }}
    <link rel="apple-touch-icon" sizes="180x180" href="{{ $180.RelPermalink }}" />
    <link rel="icon" type="image/png" sizes="32x32" href="{{ $32.RelPermalink }}" />
    <link rel="icon" type="image/png" sizes="16x16" href="{{ $16.RelPermalink }}" />
    <link rel="icon" type="image/png" href="{{ $32.RelPermalink }}" />
  {{ end }}
{{ end }}
